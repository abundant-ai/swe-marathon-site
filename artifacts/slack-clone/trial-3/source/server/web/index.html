<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Huddle</title>
<link rel="stylesheet" href="/app.css" />
</head>
<body>
<div id="app"></div>

<!-- AUTH SCREEN -->
<template id="tpl-auth">
  <div class="auth-shell">
    <div class="auth-card">
      <h1 class="auth-title">Huddle</h1>
      <p class="auth-tagline">Where teams come together.</p>
      <form data-testid="auth-form" class="auth-form">
        <label class="field">
          <span>Username</span>
          <input type="text" name="username" autocomplete="username" required />
        </label>
        <label class="field" data-only="signup">
          <span>Display name (optional)</span>
          <input type="text" name="display_name" autocomplete="name" />
        </label>
        <label class="field">
          <span>Password</span>
          <input type="password" name="password" autocomplete="current-password" required minlength="1" />
        </label>
        <div class="auth-error" data-testid="auth-error" hidden></div>
        <button type="submit" data-testid="auth-submit" class="primary-btn">Sign in</button>
      </form>
      <div class="auth-toggle-row">
        <span class="auth-toggle-text"></span>
        <button type="button" data-testid="auth-toggle" class="link-btn"></button>
      </div>
    </div>
  </div>
</template>

<!-- WORKSPACE PICKER -->
<template id="tpl-workspaces">
  <div class="workspace-picker-shell">
    <header class="workspace-picker-header">
      <div class="picker-brand">Huddle</div>
      <div class="picker-account">
        <span data-testid="current-user"></span>
        <button class="link-btn" data-testid="logout-btn">Sign out</button>
      </div>
    </header>
    <main class="workspace-picker">
      <h2>Your workspaces</h2>
      <ul class="workspaces-list" data-testid="workspaces-list"></ul>
      <div data-testid="empty-state-create-workspace" class="empty-create-workspace">
        <p>You don't belong to any workspace yet. Create one to get started.</p>
      </div>
      <section class="workspace-create">
        <h3>Create a workspace</h3>
        <form data-testid="workspace-create-form" class="ws-create-form">
          <label class="field">
            <span>Workspace name</span>
            <input type="text" name="name" required />
          </label>
          <label class="field">
            <span>URL slug (lowercase, dashes)</span>
            <input type="text" name="slug" required pattern="^[a-z0-9-]{2,32}$" />
          </label>
          <div class="ws-create-error" data-testid="workspace-create-error" hidden></div>
          <button type="submit" class="primary-btn">Create workspace</button>
        </form>
      </section>
      <section class="workspace-join">
        <h3>Join with a code</h3>
        <form data-testid="join-workspace-form" class="ws-join-form">
          <label class="field">
            <span>Invitation code</span>
            <input type="text" name="code" required />
          </label>
          <div data-testid="join-workspace-error" class="ws-create-error" hidden></div>
          <button type="submit" class="primary-btn" data-testid="join-workspace-submit">Join</button>
        </form>
      </section>
    </main>
  </div>
</template>

<!-- MAIN WORKSPACE -->
<template id="tpl-workspace">
  <div class="ws-shell">
    <aside class="sidebar" data-testid="sidebar">
      <div class="sidebar-header" data-testid="workspace-header">
        <button class="ws-name-btn" data-testid="workspace-settings-btn">
          <span class="ws-name" data-testid="workspace-name"></span>
        </button>
        <div class="ws-user">
          <span data-testid="current-user"></span>
          <button class="link-btn" data-testid="logout-btn">Sign out</button>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">
          Channels
          <button class="icon-btn" data-testid="new-channel-btn" title="Create channel">+</button>
        </div>
        <ul class="channel-list" data-testid="channel-list"></ul>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">Direct messages</div>
        <ul class="dm-list" data-testid="dms-list"></ul>
      </div>
    </aside>
    <main class="main-pane">
      <header class="channel-header" data-testid="channel-header">
        <div class="channel-header-info">
          <h2 class="channel-title" data-testid="channel-title"></h2>
          <p class="channel-topic" data-testid="channel-topic"></p>
        </div>
        <div class="channel-header-actions">
          <button class="icon-btn" data-testid="channel-settings-btn" title="Channel settings">⚙</button>
        </div>
      </header>
      <div class="message-list" data-testid="message-list"></div>
      <div class="message-empty" data-testid="message-empty" hidden>
        <p>This is the very beginning of <span data-testid="message-empty-channel"></span>. Say hello to your team!</p>
      </div>
      <form class="composer" data-testid="composer-form">
        <textarea data-testid="message-input" name="body" rows="2" placeholder="Send a message..." required></textarea>
        <button type="submit" class="primary-btn" data-testid="send-btn">Send</button>
      </form>
    </main>
    <aside class="thread-panel" data-testid="thread-panel" hidden>
      <header class="thread-header">
        <h3>Thread</h3>
        <button class="icon-btn" data-testid="close-thread">×</button>
      </header>
      <div class="thread-parent" data-testid="thread-parent"></div>
      <div class="thread-replies" data-testid="thread-replies"></div>
      <form class="composer" data-testid="thread-form">
        <textarea name="body" rows="2" data-testid="thread-input" placeholder="Reply..." required></textarea>
        <button type="submit" class="primary-btn" data-testid="thread-send">Reply</button>
      </form>
    </aside>
    <!-- Modals -->
    <div class="modal-backdrop" data-testid="create-channel-backdrop" hidden>
      <div class="modal">
        <h3>Create a channel</h3>
        <form data-testid="create-channel-form">
          <label class="field">
            <span>Channel name</span>
            <input type="text" name="name" required />
          </label>
          <label class="field">
            <span>Topic (optional)</span>
            <input type="text" name="topic" maxlength="250" />
          </label>
          <label class="check">
            <input type="checkbox" name="is_private" data-testid="create-channel-private" />
            <span>Make private</span>
          </label>
          <div class="ws-create-error" data-testid="create-channel-error" hidden></div>
          <div class="modal-actions">
            <button type="button" class="link-btn" data-testid="create-channel-cancel">Cancel</button>
            <button type="submit" class="primary-btn" data-testid="create-channel-submit">Create</button>
          </div>
        </form>
      </div>
    </div>
    <div class="modal-backdrop" data-testid="ws-settings-backdrop" hidden>
      <div class="modal modal-wide">
        <header class="modal-header">
          <h3>Workspace settings</h3>
          <button class="icon-btn" data-testid="workspace-settings-close">×</button>
        </header>
        <nav class="settings-tabs">
          <button data-testid="settings-tab-general" class="tab-btn active">General</button>
          <button data-testid="settings-tab-members" class="tab-btn">Members</button>
          <button data-testid="settings-tab-invitations" class="tab-btn">Invitations</button>
        </nav>
        <section class="settings-pane" data-testid="settings-pane-general">
          <form data-testid="workspace-general-form">
            <label class="field">
              <span>Name</span>
              <input type="text" name="name" data-testid="workspace-name-input" />
            </label>
            <label class="field">
              <span>Join mode</span>
              <select name="join_mode" data-testid="workspace-join-mode">
                <option value="open">Open</option>
                <option value="invite_only">Invite only</option>
              </select>
            </label>
            <button type="submit" class="primary-btn" data-testid="workspace-general-submit">Save</button>
          </form>
        </section>
        <section class="settings-pane" data-testid="settings-pane-members" hidden>
          <ul class="member-list" data-testid="member-list"></ul>
        </section>
        <section class="settings-pane" data-testid="settings-pane-invitations" hidden>
          <button class="primary-btn" data-testid="create-invitation-btn">New invitation</button>
          <form data-testid="create-invitation-form" hidden>
            <label class="field">
              <span>Email (optional)</span>
              <input type="email" name="email" />
            </label>
            <label class="field">
              <span>Max uses</span>
              <input type="number" name="max_uses" min="1" max="100" value="1" />
            </label>
            <button type="submit" class="primary-btn" data-testid="create-invitation-submit">Create</button>
          </form>
          <ul class="invitations-list" data-testid="invitations-list"></ul>
        </section>
      </div>
    </div>

    <div class="modal-backdrop" data-testid="channel-settings-backdrop" hidden>
      <div class="modal modal-wide">
        <header class="modal-header">
          <h3 data-testid="channel-settings-title">Channel settings</h3>
          <button class="icon-btn" data-testid="channel-settings-close">×</button>
        </header>
        <section class="settings-pane">
          <form data-testid="channel-topic-form">
            <label class="field">
              <span>Topic</span>
              <input type="text" name="topic" data-testid="channel-topic-input" maxlength="250" />
            </label>
            <button type="submit" class="primary-btn" data-testid="channel-topic-submit">Save topic</button>
          </form>
          <div class="channel-archive-row">
            <button class="link-btn" data-testid="archive-channel-btn">Archive channel</button>
            <button class="link-btn" data-testid="unarchive-channel-btn" hidden>Unarchive</button>
          </div>
          <h4>Members</h4>
          <ul class="member-list" data-testid="channel-members-list"></ul>
          <form data-testid="channel-add-member-form">
            <label class="field">
              <span>Add member by username</span>
              <input type="text" name="username" data-testid="channel-add-member-input" />
            </label>
            <button type="submit" class="primary-btn" data-testid="channel-add-member-submit">Add</button>
          </form>
        </section>
      </div>
    </div>
    <div class="modal-backdrop" data-testid="emoji-picker-backdrop" hidden>
      <div class="emoji-picker" data-testid="emoji-picker">
        <h4>Pick a reaction</h4>
        <div class="emoji-grid" data-testid="emoji-grid"></div>
        <button class="link-btn" data-testid="emoji-cancel">Cancel</button>
      </div>
    </div>
  </div>
</template>

<script src="/app.js"></script>
</body>
</html>
