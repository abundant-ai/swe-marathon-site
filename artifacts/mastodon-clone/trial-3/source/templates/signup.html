{% extends "base.html" %}
{% block content %}
<div class="narrow">
<h1>Create your {{ INSTANCE_TITLE }} account</h1>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="post" action="/signup" class="auth-form">
  <label>Username <input name="username" required pattern="[a-zA-Z0-9_]{2,30}"></label>
  <label>Email <input type="email" name="email"></label>
  <label>Password <input type="password" name="password" required minlength="6" autocomplete="new-password"></label>
  <button class="btn btn-primary" type="submit">Sign up</button>
</form>
<p>Already have one? <a href="/login">Log in</a></p>
</div>
{% endblock %}
