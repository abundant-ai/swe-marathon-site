{% extends "base.html" %}
{% block content %}
<section class="auth-panel">
  <h1>{% if mode == "signup" %}Create account{% else %}Sign in{% endif %}</h1>
  {% if error %}<p class="form-error">{{ error }}</p>{% endif %}
  <form method="post" action="{% if mode == "signup" %}/signup{% else %}/login{% endif %}">
    <label>Username<input name="username" autocomplete="username" required></label>
    {% if mode == "signup" %}<label>Display name<input name="display_name" autocomplete="name"></label>{% endif %}
    <label>Password<input name="password" type="password" autocomplete="{% if mode == "signup" %}new-password{% else %}current-password{% endif %}" required></label>
    <button class="primary-button" type="submit">{% if mode == "signup" %}Sign up{% else %}Sign in{% endif %}</button>
  </form>
</section>
{% endblock %}
