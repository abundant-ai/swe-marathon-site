{% extends "base.html" %}
{% block title %}{{ title }} — Chirp{% endblock %}
{% block main %}
<div class="main-header">{{ title }}</div>
<div>
{% for a in accounts %}
<div style="display:grid; grid-template-columns: 48px 1fr; gap: 0.7rem; padding: 0.7rem 1rem; border-bottom: 1px solid var(--c-border)">
  <div class="avatar" style="width:48px;height:48px;border-radius:8px;overflow:hidden"><img src="{{ a.avatar }}" style="width:100%;height:100%;object-fit:cover" alt=""></div>
  <div>
    <a href="/@{{ a.username }}"><strong>{{ a.display_name }}</strong></a>
    <div class="muted">@{{ a.acct if '@' in a.acct else a.username + '@' + instance_domain }}</div>
    <div>{{ a.note_html|safe }}</div>
  </div>
</div>
{% else %}
<div class="empty-state"><p>Empty.</p></div>
{% endfor %}
</div>
{% endblock %}
