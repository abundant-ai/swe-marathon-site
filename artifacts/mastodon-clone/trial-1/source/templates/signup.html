{% extends "base.html" %}
{% block title %}Sign up — Chirp{% endblock %}
{% block layout %}
<div class="auth-card" style="grid-column: 1 / -1">
  <h1>Join Chirp</h1>
  {% if error %}<div class="error-banner">{{ error }}</div>{% endif %}
  <form method="post" action="/web/signup">
    <input type="hidden" name="csrf" value="{{ csrf }}">
    <div class="field"><label for="u">Username</label><input id="u" name="username" pattern="[A-Za-z0-9_]{2,20}" required></div>
    <div class="field"><label for="d">Display name</label><input id="d" name="display_name"></div>
    <div class="field"><label for="e">Email</label><input id="e" name="email" type="email" required></div>
    <div class="field"><label for="p">Password</label><input id="p" name="password" type="password" autocomplete="new-password" minlength="8" required></div>
    <button class="btn" type="submit">Create account</button>
    <p class="muted" style="margin-top: 1rem">Already a member? <a href="/login">Log in</a>.</p>
  </form>
</div>
{% endblock %}
