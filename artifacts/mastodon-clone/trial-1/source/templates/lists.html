{% extends "base.html" %}
{% block title %}Lists — Chirp{% endblock %}
{% block main %}
<div class="main-header">Lists</div>
<form method="post" action="/web/lists" style="padding: 1rem; border-bottom: 1px solid var(--c-border)">
  <input type="hidden" name="csrf" value="{{ csrf }}">
  <input name="title" placeholder="New list name" required>
  <button class="btn" type="submit">Create</button>
</form>
<ul style="list-style: none; padding: 0">
{% for l in lists %}
<li style="padding: 0.6rem 1rem; border-bottom: 1px solid var(--c-border)">
  <strong>{{ l.title }}</strong>
  <span class="muted">— {{ l.member_count }} members</span>
</li>
{% else %}
<li class="empty-state"><p>No lists yet.</p></li>
{% endfor %}
</ul>
{% endblock %}
