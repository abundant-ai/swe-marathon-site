<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Tabula</title>
<style>
  * { box-sizing: border-box; }
  body { font: 14px/1.4 -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; background: #fafafa; }
  header { background: #2c3e50; color: white; padding: 8px 12px; display: flex; align-items: center; gap: 12px; }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; }
  main { flex: 1; display: flex; min-height: 0; }
  #sidebar { width: 220px; background: #ecf0f1; border-right: 1px solid #bdc3c7; padding: 8px; overflow-y: auto; }
  #sidebar h2 { font-size: 12px; text-transform: uppercase; color: #7f8c8d; margin: 8px 0 4px; }
  #workbook-list { list-style: none; padding: 0; margin: 0; }
  #workbook-list li { padding: 6px 8px; cursor: pointer; border-radius: 3px; }
  #workbook-list li:hover, #workbook-list li.active { background: #d5dbdb; }
  #content { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #toolbar { padding: 6px 8px; background: #f5f5f5; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 8px; }
  #formula-bar { flex: 1; padding: 4px 8px; font-family: monospace; border: 1px solid #ccc; border-radius: 3px; }
  #grid-wrap { flex: 1; overflow: auto; background: white; }
  table.grid { border-collapse: collapse; }
  table.grid td, table.grid th { border: 1px solid #ddd; padding: 2px 6px; min-width: 80px; height: 22px; font-family: monospace; cursor: cell; vertical-align: middle; }
  table.grid th { background: #f0f0f0; font-weight: 500; color: #555; text-align: center; min-width: 30px; cursor: default; }
  table.grid td.active { outline: 2px solid #3498db; outline-offset: -2px; }
  table.grid td.error { color: #c0392b; }
  table.grid td.spill { color: #888; }
  #tabs { padding: 4px 8px; background: #ecf0f1; border-top: 1px solid #bdc3c7; }
  #tabs button { background: white; border: 1px solid #bdc3c7; padding: 4px 12px; margin-right: 2px; cursor: pointer; }
  #tabs button.active { background: #3498db; color: white; }
  button { background: #3498db; color: white; border: none; padding: 6px 12px; border-radius: 3px; cursor: pointer; }
  button:hover { background: #2980b9; }
  button.secondary { background: #95a5a6; }
  button.secondary:hover { background: #7f8c8d; }
  #cell-ref { width: 60px; padding: 4px 6px; font-family: monospace; border: 1px solid #ccc; }
</style>
</head>
<body>
<header>
  <h1>Tabula</h1>
  <span id="status" style="font-size: 11px; opacity: 0.7;"></span>
</header>
<main>
  <aside id="sidebar">
    <button id="new-workbook-btn" data-testid="new-workbook-btn">+ New workbook</button>
    <h2>Workbooks</h2>
    <ul id="workbook-list" data-testid="workbook-list"></ul>
  </aside>
  <section id="content">
    <div id="toolbar">
      <input id="cell-ref" readonly />
      <input id="formula-bar" data-testid="formula-bar" placeholder="Select a cell" />
      <button id="save-btn" data-testid="save-btn">Save</button>
    </div>
    <div id="grid-wrap"></div>
    <div id="tabs" data-testid="sheet-tabs"></div>
  </section>
</main>
<script src="/static/app.js"></script>
</body>
</html>
