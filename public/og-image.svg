        <text x="1068" y="34" fill="#F4F4F5" font-size="14" font-weight="700" letter-spacing="1.1" text-anchor="end">~100K TOKENS</text>
        <text x="1068" y="53" fill="#A1A1AA" font-size="13" letter-spacing="1.1" text-anchor="end">UNLOCKED CODING AGENTS</text>
      </g>

      <g transform="translate(56 128)">
        <rect x="0" y="0" width="304" height="64" fill="#121312" stroke="#303530" stroke-width="1.2"/>
        <line x1="304" y1="0" x2="1064" y2="0" stroke="#303530" stroke-width="1.2"/>
        <text x="22" y="25" fill="#A1A1AA" font-size="13" letter-spacing="1.1">2025</text>
        <text x="22" y="49" fill="#F4F4F5" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="21" font-weight="700">Terminal-Bench</text>
