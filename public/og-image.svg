<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#121312"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="40" y="100" fill="#6BCF70" font-size="38" font-weight="800">New capabilities require new benchmarks.</text>
    <text x="40" y="148" fill="#F4F4F5" font-size="38" font-weight="750">SWE-Marathon measures whether coding agents</text>
    <text x="40" y="196" fill="#F4F4F5" font-size="38" font-weight="800">can stay coherent over a 1B+ token budget.</text>
  </g>

  <g transform="translate(40 246)">
