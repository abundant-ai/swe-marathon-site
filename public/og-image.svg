      <g transform="translate(0 0)">
        <rect x="0" y="0" width="304" height="64" fill="#121312" stroke="#303530" stroke-width="1.2"/>
        <line x1="304" y1="0" x2="1120" y2="0" stroke="#303530" stroke-width="1.2"/>
        <text x="22" y="25" fill="#A1A1AA" font-size="13" letter-spacing="1.1">2021</text>
        <text x="22" y="49" fill="#F4F4F5" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="21" font-weight="700">HumanEval</text>
        <text x="342" y="34" fill="#D4D4D8" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="19">Function completion</text>
        <text x="342" y="54" fill="#A1A1AA" font-size="13" letter-spacing="1.1">~1 MIN PER TASK</text>
        <text x="1096" y="34" fill="#F4F4F5" font-size="14" font-weight="700" letter-spacing="1.1" text-anchor="end">~1K TOKENS</text>
        <text x="1096" y="53" fill="#A1A1AA" font-size="13" letter-spacing="1.1" text-anchor="end">UNLOCKED CODE LLMS</text>
      </g>

      <g transform="translate(28 64)">
        <rect x="0" y="0" width="304" height="64" fill="#121312" stroke="#303530" stroke-width="1.2"/>
        <line x1="304" y1="0" x2="1092" y2="0" stroke="#303530" stroke-width="1.2"/>
        <text x="22" y="25" fill="#A1A1AA" font-size="13" letter-spacing="1.1">2023</text>
        <text x="22" y="49" fill="#F4F4F5" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="21" font-weight="700">SWE-bench</text>
        <text x="342" y="34" fill="#D4D4D8" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="19">Real GitHub issues</text>
