        <text x="1012" y="40" fill="#6BCF70" font-size="17" font-weight="700" letter-spacing="1.1" text-anchor="end">1B+ TOKENS</text>
        <text x="1012" y="62" fill="#8BDB91" font-size="13" letter-spacing="1.1" text-anchor="end">UNLOCKING AUTONOMOUS AGENTS</text>
