    <meta name="theme-color" content="#FFFFFF" />
    <script>
      (() => {
        const STORAGE_KEY = "swe-marathon-theme";
        const modes = ["light", "dark"];
        const media = window.matchMedia("(prefers-color-scheme: dark)");
        const themeColor = { light: "#FFFFFF", dark: "#121312" };

        function storedMode() {
          const value = localStorage.getItem(STORAGE_KEY);
          return modes.includes(value) ? value : effectiveTheme("system");
        }

        function effectiveTheme(mode) {
          return mode === "system" ? (media.matches ? "dark" : "light") : mode;
        }

        function applyTheme(mode) {
          const effective = effectiveTheme(mode);
          document.documentElement.dataset.theme = effective;
          document.documentElement.dataset.themeMode = mode;
          document.documentElement.style.colorScheme = effective;
          document.querySelector('meta[name="theme-color"]')?.setAttribute("content", themeColor[effective]);

          const button = document.querySelector("[data-theme-toggle]");
          if (button) {
            const next = mode === "dark" ? "light" : "dark";
            button.textContent = mode;
            button.setAttribute("aria-label", `Switch to ${next} mode`);
            button.setAttribute("title", `Switch to ${next} mode`);
            button.setAttribute("aria-pressed", String(mode === "dark"));
          }
        }

        window.SWEMarathonTheme = {
          set(mode) {
            const next = modes.includes(mode) ? mode : effectiveTheme("system");
            localStorage.setItem(STORAGE_KEY, next);
            applyTheme(next);
          },
          cycle() {
            const mode = storedMode();
            this.set(mode === "dark" ? "light" : "dark");
          },
        };

        applyTheme(storedMode());
        media.addEventListener("change", () => {
          if (!modes.includes(localStorage.getItem(STORAGE_KEY))) applyTheme(effectiveTheme("system"));
        });
        document.addEventListener("DOMContentLoaded", () => {
          const button = document.querySelector("[data-theme-toggle]");
          button?.addEventListener("click", () => window.SWEMarathonTheme.cycle());
          applyTheme(storedMode());
        });
      })();
    </script>
